server:
  port: 8070

spring:
  datasource:
    # 로컬과 운영 DB 동시에 적용
    url: jdbc:mysql://${DB_HOST}:3306/questrunner?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${DB_ROOT_PASSWORD}

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  # -----------------------------
  # OAuth2
  # -----------------------------
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

        provider:
          google:
            user-name-attribute: sub


# -----------------------------
# JWT
# -----------------------------
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION}


# -----------------------------
# OAuth2 프론트 리다이렉트
# -----------------------------
app:
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI}

logging:
  level:
    root: WARN
